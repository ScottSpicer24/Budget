<div class="flex flex-col rounded-lg bg-background px-8 py-8">
  <!-- Card Header -->
  <div class="mb-6 flex items-center justify-between">
    <div class="flex flex-col">
      <h3 class="text-md font-bold text-foreground">Income</h3>
      <span class="text-xs text-muted-foreground">Income by source</span>
    </div>
    <!-- Column labels -->
    <div class="flex items-center gap-3 pr-1 text-xs text-muted-foreground">
      <span class="w-16 text-right">% of total</span>
      <span class="w-20 text-right">Amount</span>
    </div>
  </div>

  <!-- Income Rows -->
  <div class="divide-y divide-border">
    @for (item of draft(); track $index) {
      <app-income-row
        [income]="item"
        [totalIncome]="totalDraftIncome()"
        (incomeChange)="onRowChange($index, $event)">
      </app-income-row>
    }
    @if (draft().length === 0) {
      <p class="py-3 text-xs text-muted-foreground">No income sources added yet.</p>
    }
  </div>

  <!-- Footer: Add + Save -->
  <div class="mt-4 flex items-center justify-between border-t border-border pt-4">
    <button
      (click)="addIncome()"
      class="flex items-center gap-1 rounded px-1 py-0.5 text-xs text-primary transition-colors hover:bg-primary/10">
      <svg-icon src="assets/icons/heroicons/outline/plus.svg" [svgClass]="'h-3.5 w-3.5'"></svg-icon>
      Add source
    </button>

    @if (saved()) {
      <button
        (click)="save()"
        class="flex items-center gap-1.5 rounded-md bg-green-500/15 px-3 py-1.5 text-xs font-medium text-green-600 transition-colors dark:text-green-400">
        <svg-icon src="assets/icons/heroicons/outline/shield-check.svg" [svgClass]="'h-3.5 w-3.5'"></svg-icon>
        Saved
      </button>
    } @else {
      <button
        (click)="save()"
        class="flex items-center gap-1.5 rounded-md bg-primary px-3 py-1.5 text-xs font-medium text-primary-foreground transition-colors hover:bg-primary/90">
        Save
      </button>
    }
  </div>
</div>
