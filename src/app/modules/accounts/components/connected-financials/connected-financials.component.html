<div class="flex flex-col rounded-lg bg-background px-8 py-8">
  <!-- Card Header -->
  <div class="mb-6 flex items-center justify-between">
    <div class="flex flex-col">
      <h3 class="text-md font-bold text-foreground">Connected Financials</h3>
      <span class="text-xs text-muted-foreground">Bank accounts connected to service</span>
    </div>
  </div>

  @for(account of accounts; track $index){
    <div class="flex justify-between py-2 border-t border-dashed" [class.border-b]="$last">
      <div class="flex flex-col">
        <h3 class="text-lg font-bold text-foreground">{{ account.bank }}</h3>
        <span class="text-md text-muted-foreground">{{ account.type}}</span>
      </div>

      <span class="text-primary text-xl font-bold">${{ account.balance }}</span>
    </div>
  }

  <div class="flex justify-center pt-4">
    <button
    class="rounded-md bg-primary px-4 py-2.5 text-xs font-semibold text-primary-foreground
    cursor-pointer active:scale-95 transition-transform">
      Add Account
    </button>
  </div>

</div>
