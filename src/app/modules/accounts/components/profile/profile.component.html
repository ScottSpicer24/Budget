<div class="flex flex-col rounded-lg bg-background px-8 py-8">
  <!-- Card Header -->
  <div class="mb-6 flex items-center justify-between">
    <div class="flex flex-col">
      <h3 class="text-md font-bold text-foreground">Profile</h3>
    </div>
  </div>

  <div class="w-40">
    <img class="rounded-md" src={{profile.profilePic}} alt="" />
  </div>

  <div class="mb-6 flex flex-col gap-4 pt-5">
    <!-- Name Input -->
    <div class="flex flex-col gap-2">
      <label class="text-sm font-semibold text-foreground">Name</label>
      <input
        type="text"
        [value]="profile.name"
        class="rounded-md border border-input bg-background px-3 py-2 text-foreground placeholder-muted-foreground focus:outline-none focus:ring-2 focus:ring-primary"
      />
    </div>

    <!-- Email Input -->
    <div class="flex flex-col gap-2">
      <label class="text-sm font-semibold text-foreground">Email</label>
      <input
        type="email"
        [value]="profile.email"
        class="rounded-md border border-input bg-background px-3 py-2 text-foreground placeholder-muted-foreground focus:outline-none focus:ring-2 focus:ring-primary"
      />
    </div>

    <!-- Phone Number Input -->
    <div class="flex flex-col gap-2">
      <label class="text-sm font-semibold text-foreground">Phone Number</label>
      <input
        type="tel"
        [value]="formatPhoneNumber(profile.phone_number)"
        class="rounded-md border border-input bg-background px-3 py-2 text-foreground placeholder-muted-foreground focus:outline-none focus:ring-2 focus:ring-primary"
      />
    </div>

    <!-- Password Input -->
    <div class="flex flex-col gap-2">
      <label class="text-sm font-semibold text-foreground">Password</label>
      <div class="relative flex items-center">
        <input
          [type]="showPassword ? 'text' : 'password'"
          [value]="profile.password"
          class="w-full rounded-md border border-input bg-background px-3 py-2 pr-10 text-foreground placeholder-muted-foreground focus:outline-none focus:ring-2 focus:ring-primary"
        />
        <button
          (click)="togglePasswordVisibility()"
          class="absolute right-3 z-10 flex items-center justify-center cursor-pointer text-muted-foreground hover:text-foreground transition-colors"
          type="button"
        >
        <svg-icon
            [src]="showPassword ? 'assets/icons/heroicons/outline/eye-off.svg' : 'assets/icons/heroicons/outline/eye.svg'"
            [svgStyle]="{ width: '1.25rem', height: '1.25rem' }"
          ></svg-icon>
        </button>
      </div>
    </div>

  </div>

  <div class="flex justify-center py-2">
    <button
    class="rounded-md bg-primary px-4 py-2.5 text-xs font-semibold text-primary-foreground
    cursor-pointer active:scale-95 transition-transform">
      Save Profile
    </button>
  </div>

</div>
